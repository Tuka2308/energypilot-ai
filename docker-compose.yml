services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: energypilot
      POSTGRES_PASSWORD: energypilot
      POSTGRES_DB: energypilot
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energypilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://energypilot:energypilot@db:5432/energypilot
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # Ollama обычно крутится на хосте, не в compose. host.docker.internal
    # уже работает "из коробки" на Docker Desktop (Mac/Windows); на Linux
    # нужна явная эта запись (Docker >= 20.10), иначе имя не резолвится.
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  db_data:
